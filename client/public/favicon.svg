<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="zenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="50" cy="50" r="48" fill="url(#zenGrad)"/>
  
  <!-- Flowing wave symbol representing ZenFlow -->
  <!-- Main flowing curve (stylized "Z" for ZenFlow) -->
  <path d="M 20 30 
           C 30 25, 40 30, 50 28
           C 60 26, 70 30, 80 28
           C 85 27, 80 35, 75 40
           C 65 50, 55 45, 45 50
           C 35 55, 25 50, 20 60
           C 18 65, 22 70, 30 68
           C 40 66, 50 70, 60 68
           C 70 66, 80 70, 80 75" 
        fill="none" 
        stroke="white" 
        stroke-width="4.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        opacity="0.95"/>
  
  <!-- Subtle accent flow line -->
  <path d="M 25 50 
           Q 35 48, 45 50 
           Q 55 52, 65 50 
           Q 75 48, 75 55" 
        fill="none" 
        stroke="white" 
        stroke-width="2.5" 
        stroke-linecap="round" 
        opacity="0.6"/>
</svg>
